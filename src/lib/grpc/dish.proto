syntax = "proto3";
package SpaceX.API.Device;

service Device {
  rpc Handle (Request) returns (Response);
}

message Request {
  uint64 id = 1;
  oneof request {
    GetStatusRequest get_status = 1002;
    GetHistoryRequest get_history = 1003;
  }
}

message GetStatusRequest {}
message GetHistoryRequest {}

message Response {
  uint64 id = 1;
  oneof response {
    DishGetStatusResponse dish_get_status = 1005;
    DishGetHistoryResponse dish_get_history = 1007;
  }
}

message DishGetStatusResponse {
  DeviceInfo device_info = 1;
  DeviceState device_state = 2;
  DishAlerts alerts = 1005;
  float downlink_throughput_bps = 1007;
  float uplink_throughput_bps = 1008;
  float pop_ping_latency_ms = 1009;
  float pop_ping_drop_rate = 1010;
  float snr = 1012;
  float boresight_azimuth_deg = 1015;
  float boresight_elevation_deg = 1016;
  float obstruction_percent_time = 1023;
}

message DeviceInfo {
  string id = 1;
  string hardware_version = 2;
  string software_version = 3;
}

message DeviceState {
  uint64 uptime_s = 3;
}

message DishAlerts {
  bool motors_stuck = 1;
  bool thermal_throttle = 3;
  bool thermal_shutdown = 2;
  bool unexpected_location = 8;
  bool slow_ethernet_speeds = 15;
}

message DishGetHistoryResponse {
  uint64 current = 1;
  repeated float pop_ping_latency_ms = 1001;
  repeated float downlink_throughput_bps = 1003;
  repeated float uplink_throughput_bps = 1004;
  repeated float snr = 1006;
}
